version: "3.9"
services:
  nginx:
    image: nginx:1.25-alpine
    ports: ["80:80","443:443"]
    volumes: ["./nginx/nginx.conf:/etc/nginx/nginx.conf:ro","./nginx/ssl:/etc/nginx/ssl:ro"]
    depends_on: {backend: {condition: service_healthy}, frontend: {condition: service_healthy}}
    restart: unless-stopped
    healthcheck: {test: ["CMD","nginx","-t"], interval: 30s, timeout: 10s, retries: 3}
    networks: [tc]
  backend:
    build: {context: ./backend, dockerfile: Dockerfile}
    env_file: [./backend/.env]
    environment: {REDIS_URL: "redis://redis:6379/0"}
    expose: ["8000"]
    depends_on: {redis: {condition: service_healthy}}
    restart: unless-stopped
    healthcheck: {test: ["CMD","python","-c","import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"], interval: 30s, timeout: 10s, retries: 3, start_period: 20s}
    networks: [tc]
  frontend:
    build: {context: ./frontend, dockerfile: Dockerfile}
    expose: ["3000"]
    restart: unless-stopped
    healthcheck: {test: ["CMD","wget","-qO-","http://localhost:3000"], interval: 30s, timeout: 10s, retries: 3, start_period: 30s}
    networks: [tc]
  redis:
    image: redis:7.2-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    expose: ["6379"]
    volumes: [redis_data:/data]
    restart: unless-stopped
    healthcheck: {test: ["CMD","redis-cli","ping"], interval: 15s, timeout: 5s, retries: 5}
    networks: [tc]
volumes: {redis_data: {}}
networks: {tc: {driver: bridge}}
